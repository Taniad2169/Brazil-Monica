<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WebSwan Games 🦢 | Daylight Memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:   #0e6296;
    --teal:   #1dc29e;
    --gold:   #ffd700;
    --white:  #ffffff;
    --sky-blue: #87CEEB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    width: 100%;
    min-height: 100vh;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, #87CEEB 0%, #E0F7FA 50%, #ffffff 100%);
    /* Removed overflow:hidden to allow scrolling */
  }

  .game-screen {
    width: 100%;
    max-width: 600px; /* Centers the game on larger screens */
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* DAYLIGHT HEADER */
  .memory-header { 
    background: rgba(255, 255, 255, 0.9); 
    padding: 15px; 
    text-align: center; 
    border-bottom: 3px solid var(--teal); 
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .memory-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--navy); }
  .memory-title span { color: var(--teal); }
  
  .memory-stats { 
    display: flex; 
    justify-content: center; 
    gap: 16px; 
    padding: 10px; 
    background: rgba(255, 255, 255, 0.6); 
  }
  .mem-stat { text-align: center; }
  .mem-stat-label { font-size: 0.65rem; text-transform: uppercase; color: var(--navy); font-weight: 700; }
  .mem-stat-val { font-family: 'Space Mono', monospace; font-size: 1.1rem; color: #333; font-weight: 700; }
  
  .mem-difficulty { display: flex; justify-content: center; gap: 8px; padding: 15px 10px; }
  .diff-btn { padding: 8px 16px; border-radius: 30px; border: 2px solid var(--navy); background: transparent; color: var(--navy); font-size: 0.75rem; font-weight: 700; cursor: pointer; }
  .diff-btn.active { background: var(--navy); color: var(--white); }
  
  .memory-grid-wrap { padding: 10px; }
  .memory-grid { display: grid; gap: 8px; width: 100%; margin: auto; }
  
  .mem-card { aspect-ratio: 1; position: relative; cursor: pointer; transform-style: preserve-3d; transition: transform 0.45s; border-radius: 12px; }
  .mem-card.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; inset: 0; border-radius: 12px; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 4px; }
  
  .card-back { background: #fff; border: 2px solid var(--navy); }
  .card-back::before { content: '🦢'; font-size: 1.8rem; }
  
  .card-front { background: #fff; border: 2px solid var(--teal); transform: rotateY(180deg); }
  .card-emoji { font-size: 2rem; }
  .card-label { font-size: 0.6rem; font-weight: 700; color: var(--white); background: var(--navy); padding: 1px 6px; border-radius: 10px; }
  
  .memory-controls { display: flex; gap: 10px; padding: 20px; margin-top: auto; }
  .mem-ctrl-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; background: var(--navy); color: white; font-size: 0.9rem; }

  /* WIN OVERLAY */
  #memory-win { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  #memory-win.show { display: flex; }
  .win-card { background: white; border: 4px solid var(--gold); border-radius: 24px; padding: 30px; text-align: center; width: 100%; max-width: 400px; }
  .win-trophy { font-size: 4rem; display: block; }
  .win-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--navy); }
  .win-btn { background: var(--gold); color: var(--navy); border: none; padding: 12px 30px; border-radius: 30px; font-weight: 800; cursor: pointer; margin-top: 15px; }

  /* CELEBRATION */
  .confetti { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 101; animation: fall 3s linear forwards; }
  @keyframes fall {
    0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="game-screen">
  <div class="memory-header"><div class="memory-title">☀️ <span>WebSwan</span> Daylight</div></div>
  <div class="memory-stats">
    <div class="mem-stat"><div class="mem-stat-label">Moves</div><div class="mem-stat-val" id="mem-moves">0</div></div>
    <div class="mem-stat"><div class="mem-stat-label">Pairs</div><div class="mem-stat-val" id="mem-pairs">0/10</div></div>
    <div class="mem-stat"><div class="mem-stat-label">Time</div><div class="mem-stat-val" id="mem-timer">0s</div></div>
  </div>
  <div class="mem-difficulty">
    <button class="diff-btn" onclick="setDifficulty('easy', this)">Easy</button>
    <button class="diff-btn active" onclick="setDifficulty('medium', this)">Medium</button>
    <button class="diff-btn" onclick="setDifficulty('hard', this)">Hard</button>
  </div>
  <div class="memory-grid-wrap"><div class="memory-grid" id="memory-grid"></div></div>
  <div class="memory-controls">
    <button class="mem-ctrl-btn" onclick="initMemoryGame()">🔄 New Game</button>
    <button class="mem-ctrl-btn" onclick="showHint()">💡 Peek</button>
  </div>
</div>

<div id="memory-win">
  <div class="win-card">
    <span class="win-trophy">🏆</span>
    <div class="win-title">Victory!</div>
    <div class="win-stats" id="win-stats" style="margin: 10px 0; color: var(--navy); font-weight: 600;"></div>
    <button class="win-btn" onclick="initMemoryGame()">Play Again</button>
  </div>
</div>

<script>
const memImages = [
  {emoji:"🎷", label:"Sax"}, {emoji:"🎸", label:"Guitar"}, {emoji:"🎹", label:"Keys"}, {emoji:"🎺", label:"Trumpet"},
  {emoji:"🎨", label:"Art"}, {emoji:"🎭", label:"Drama"}, {emoji:"🧶", label:"Knit"}, {emoji:"🧵", label:"Sew"},
  {emoji:"🦢", label:"Swan"}, {emoji:"🎯", label:"Goal"}, {emoji:"💎", label:"Gem"}, {emoji:"🌊", label:"Ocean"}
];

let flippedCards = [];
let matchedPairs = 0;
let moves = 0;
let timer = 0;
let timerInterval;
let difficulty = 'medium';

function setDifficulty(lvl, btn) {
  difficulty = lvl;
  document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  initMemoryGame();
}

function initMemoryGame() {
  clearInterval(timerInterval);
  timer = 0; moves = 0; matchedPairs = 0; flippedCards = [];
  document.getElementById('mem-moves').innerText = '0';
  document.getElementById('mem-pairs').innerText = `0/${getPairCount()}`;
  document.getElementById('mem-timer').innerText = '0s';
  document.getElementById('memory-win').classList.remove('show');
  document.querySelectorAll('.confetti').forEach(el => el.remove());

  const pairCount = getPairCount();
  const gameCards = [...memImages.slice(0, pairCount), ...memImages.slice(0, pairCount)];
  gameCards.sort(() => Math.random() - 0.5);

  const grid = document.getElementById('memory-grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = difficulty === 'easy' ? 'repeat(3, 1fr)' : 'repeat(4, 1fr)';

  gameCards.forEach((item, index) => {
    const card = document.createElement('div');
    card.className = 'mem-card';
    card.dataset.label = item.label;
    card.innerHTML = `
      <div class="card-face card-back"></div>
      <div class="card-face card-front">
        <div class="card-emoji">${item.emoji}</div>
        <div class="card-label">${item.label}</div>
      </div>
    `;
    card.onclick = () => flipCard(card);
    grid.appendChild(card);
  });

  timerInterval = setInterval(() => {
    timer++;
    document.getElementById('mem-timer').innerText = timer + 's';
  }, 1000);
}

function getPairCount() {
  return difficulty === 'easy' ? 6 : difficulty === 'medium' ? 10 : 12;
}

function flipCard(card) {
  if (flippedCards.length === 2 || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  card.classList.add('flipped');
  flippedCards.push(card);
  if (flippedCards.length === 2) {
    moves++;
    document.getElementById('mem-moves').innerText = moves;
    checkMatch();
  }
}

function checkMatch() {
  const [c1, c2] = flippedCards;
  if (c1.dataset.label === c2.dataset.label) {
    c1.classList.add('matched');
    c2.classList.add('matched');
    matchedPairs++;
    document.getElementById('mem-pairs').innerText = `${matchedPairs}/${getPairCount()}`;
    flippedCards = [];
    if (matchedPairs === getPairCount()) winGame();
  } else {
    setTimeout(() => {
      c1.classList.remove('flipped');
      c2.classList.remove('flipped');
      flippedCards = [];
    }, 1000);
  }
}

function showHint() {
  const cards = document.querySelectorAll('.mem-card:not(.flipped)');
  cards.forEach(c => c.classList.add('flipped'));
  setTimeout(() => {
    cards.forEach(c => {
      if (!c.classList.contains('matched')) c.classList.remove('flipped');
    });
  }, 1000);
}

function winGame() {
  clearInterval(timerInterval);
  document.getElementById('win-stats').innerText = `Time: ${timer}s | Moves: ${moves}`;
  document.getElementById('memory-win').classList.add('show');
  startCelebration();
}

function startCelebration() {
  const colors = ['#ffd700', '#1dc29e', '#ff6b6b', '#87CEEB', '#0e6296'];
  for (let i = 0; i < 60; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 2 + 's';
    document.body.appendChild(c);
  }
}

initMemoryGame();
</script>
</body>
</html>
