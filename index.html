<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Swan Kids 🦢 | Smart Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Playfair+Display:wght@900&display=swap" rel="stylesheet">
<style>
  :root {
    --sun-yellow: #FFD700;
    --sky-blue: #87CEEB;
    --grass-green: #2ECC71;
    --navy: #0e6296;
    --team-a: #FF6B6B;
    --team-b: #4facfe;
    --memory-blue: #9beafa;
  }

  /* SMOOTH SCROLL ENABLED */
  html { scroll-behavior: smooth; }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(180deg, var(--sky-blue) 0%, #E0F7FA 100%);
    min-height: 100vh;
    color: var(--navy);
  }

  .emoji-banner {
    height: 100px;
    background: white;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    border-bottom: 4px solid var(--sun-yellow);
  }

  .banner-emoji {
    position: absolute;
    font-size: 5rem;
    opacity: 0;
    transform: scale(0.1);
  }

  @keyframes zoomInOut {
    0% { transform: scale(0.1); opacity: 0; }
    20% { opacity: 1; }
    80% { opacity: 1; }
    100% { transform: scale(2.5); opacity: 0; }
  }

  .nav-tabs { display: flex; background: white; border-bottom: 2px solid var(--sky-blue); }
  .tab-btn { flex: 1; padding: 15px; border: none; font-weight: 800; cursor: pointer; background: white; color: var(--navy); }
  .tab-btn.active { background: var(--navy); color: white; }

  #start-screen {
    position: fixed; inset: 0; background: white; z-index: 3000;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
    overflow-y: auto;
  }
  .mode-btn {
    width: 100%; max-width: 320px; padding: 18px; margin: 8px;
    border: none; border-radius: 20px; font-weight: 800; font-size: 1.1rem;
    cursor: pointer; background: var(--navy); color: white;
    text-decoration: none; text-align: center;
  }
  
  .memory-btn { background: var(--memory-blue); color: var(--navy); box-shadow: 0 4px 15px rgba(155, 234, 250, 0.4); }

  .container { padding: 20px; max-width: 500px; margin: 0 auto; width: 100%; }

  .game-card { background: white; border-radius: 25px; padding: 25px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
  .image-display { font-size: 80px; background: #f0faff; border-radius: 20px; margin-bottom: 20px; padding: 30px; min-height: 160px; display: flex; align-items: center; justify-content: center; }
  .option-btn { width: 100%; padding: 18px; border: 2.5px solid var(--sky-blue); border-radius: 18px; background: white; font-weight: 800; font-size: 1.1rem; cursor: pointer; margin-bottom: 10px; }
  .option-btn.correct { background: var(--grass-green); color: white; }
  .option-btn.wrong { background: #FF6B6B; color: white; }

  #score-screen { position: fixed; inset: 0; background: white; z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
  .confetti { position: fixed; width: 12px; height: 12px; pointer-events: none; z-index: 999; animation: fall 3s linear forwards; }
</style>
</head>
<body>

<div id="start-screen">
  <div style="font-size: 4rem; margin-bottom: 10px;">🦢</div>
  <h1 style="font-family: 'Playfair Display', serif; margin-bottom: 25px;">Swan Kids Adventure</h1>
  <button class="mode-btn" onclick="startGame(1)">1 Jogador</button>
  <button class="mode-btn" onclick="startGame(2)">2 Jogadores</button>
  <button class="mode-btn" onclick="startGame(4)">4 Jogadores</button>
  <a href="https://taniad2169.github.io/Brazil-Monica/" class="mode-btn memory-btn">Jogar Jogo da Memória 🧩</a>
</div>

<div class="emoji-banner" id="banner">
  <span class="banner-emoji">🦢</span>
  <span class="banner-emoji">🚀</span>
  <span class="banner-emoji">🍭</span>
  <span class="banner-emoji">🎨</span>
  <span class="banner-emoji">🏖️</span>
  <span class="banner-emoji">⚽</span>
</div>

<div class="nav-tabs">
  <button class="tab-btn active" id="tab-game" onclick="switchTab('game')">JOGAR</button>
  <button class="tab-btn" id="tab-trans" onclick="switchTab('translator')">TRADUTOR</button>
</div>

<div class="container" id="game-section">
  <div id="turn-display" style="padding: 10px; border-radius: 12px; text-align: center; font-weight: 800; margin-bottom: 15px; background: white; border: 2px solid var(--sky-blue);">Swan Kids</div>
  <div class="game-card">
    <div class="image-display" id="display-emoji">🎨</div>
    <div id="question-pt" style="font-weight: 700; margin-bottom: 20px;"></div>
    <div id="options-container"></div>
  </div>
</div>

<div class="container" id="translator-view" style="display:none;">
  <div class="translator-card" style="background:white; border-radius:25px; padding:25px; text-align:center; box-shadow: 0 10px 25px rgba(0,0,0,0.1);">
    <p style="font-weight: 800; margin-bottom: 10px;">Tradutor Mágico</p>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
      <button class="tab-btn active" style="border-radius:12px; border:2px solid var(--sky-blue);">Português 🇧🇷</button>
      <button class="tab-btn" style="border-radius:12px; border:2px solid var(--sky-blue);">English 🇺🇸</button>
    </div>
    <textarea id="trans-input" placeholder="Digite aqui..." style="width:100%; height:100px; padding:15px; border-radius:15px; border:2px solid var(--sky-blue); font-size:1.1rem; margin-bottom:10px; resize:none;"></textarea>
    <button class="action-btn" onclick="processMagic()" style="width:100%; padding:15px; background:var(--grass-green); color:white; border:none; border-radius:15px; font-weight:800; font-size:1.1rem;">🔊 Traduzir & Ouvir</button>
  </div>
</div>

<script>
  // Banner Animation
  const emojis = document.querySelectorAll('.banner-emoji');
  let emojiIndex = 0;
  function runBanner() {
    emojis.forEach(e => { e.style.animation = 'none'; e.style.opacity = '0'; });
    const current = emojis[emojiIndex];
    current.style.opacity = '1';
    current.style.animation = 'zoomInOut 3s ease-in-out forwards';
    emojiIndex = (emojiIndex + 1) % emojis.length;
    setTimeout(runBanner, 3000);
  }
  runBanner();

  // Game Logic
  let gameMode = 1; let currentLevel = 0; let turnIndex = 0; let subTurnIndex = 0; let scores = [0, 0]; let canClick = true;
  const questions = [
    { emoji: "🟦", q: "Que cor é essa?", options: ["Blue", "Red", "Green"], correct: 0, color: "#0000FF" },
    { emoji: "🏠", q: "O que é isso?", options: ["A house", "A car", "A bus"], correct: 0 },
    { emoji: "🚗", q: "O que é isso?", options: ["A house", "A car", "A shoe"], correct: 1 },
    { emoji: "🛏️", q: "Estou com sono...", options: ["I am hungry", "I am tired", "I am sleepy"], correct: 2 },
    { emoji: "🏖️", q: "Vamos para a...", options: ["Mountain", "Beach", "Forest"], correct: 1 },
    { emoji: "🚿", q: "O que é isso?", options: ["Shower", "Bath", "Bed"], correct: 0 },
    { emoji: "🚌", q: "O que é isso?", options: ["A bus", "A car", "A plane"], correct: 0 },
    { emoji: "👟", q: "O que é isso?", options: ["A foot", "A hand", "A shoe"], correct: 2 },
    { emoji: "⛰️", q: "Como se diz montanha?", options: ["Mountain", "Beach", "River"], correct: 0 },
    { emoji: "🌊", q: "Como se diz o oceano?", options: ["Ocean", "Lake", "Pool"], correct: 0 }
  ];

  function startGame(mode) {
    gameMode = mode;
    document.getElementById('start-screen').style.display = 'none';
    loadLevel();
  }

  function switchTab(tab) {
    const isGame = tab === 'game';
    document.getElementById('game-section').style.display = isGame ? 'block' : 'none';
    document.getElementById('translator-view').style.display = isGame ? 'none' : 'block';
    document.getElementById('tab-game').classList.toggle('active', isGame);
    document.getElementById('tab-trans').classList.toggle('active', !isGame);
  }

  function loadLevel() {
    if (currentLevel >= 10) { showScore(); return; }
    canClick = true; updateTurnDisplay();
    const level = questions[currentLevel];
    const display = document.getElementById('display-emoji');
    display.innerText = level.emoji;
    display.style.background = level.color || "#f0faff";
    document.getElementById('question-pt').innerText = level.q;
    const container = document.getElementById('options-container');
    container.innerHTML = '';
    level.options.forEach((opt, idx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerText = opt;
      btn.onclick = () => checkAnswer(idx, btn);
      container.appendChild(btn);
    });
  }

  function updateTurnDisplay() {
    const el = document.getElementById('turn-display');
    if (gameMode === 1) el.innerText = `Questão ${currentLevel + 1}/10`;
    else if (gameMode === 2) {
      el.innerText = `Vez: Jogador ${turnIndex + 1}`;
      el.style.color = turnIndex === 0 ? 'var(--team-a)' : 'var(--team-b)';
    } else {
      const pNum = turnIndex === 0 ? (subTurnIndex + 1) : (subTurnIndex + 3);
      el.innerText = `Vez: Time ${turnIndex === 0 ? 'A' : 'B'} (P${pNum})`;
      el.style.color = turnIndex === 0 ? 'var(--team-a)' : 'var(--team-b)';
    }
  }

  function checkAnswer(idx, btn) {
    if (!canClick) return;
    canClick = false;
    const correct = questions[currentLevel].correct;
    if (idx === correct) {
      btn.classList.add('correct');
      scores[turnIndex]++;
      speak(questions[currentLevel].options[correct], 'en-US');
      startCelebration();
      if (gameMode === 4) subTurnIndex = subTurnIndex === 0 ? 1 : 0;
      setTimeout(() => { currentLevel++; loadLevel(); }, 2200);
    } else {
      btn.classList.add('wrong');
      speak("No, try again!", 'en-US');
      turnIndex = turnIndex === 0 ? 1 : 0;
      subTurnIndex = 0;
      setTimeout(() => { currentLevel++; loadLevel(); }, 1800);
    }
  }

  function speak(text, lang) {
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = lang; msg.rate = 0.8;
    window.speechSynthesis.speak(msg);
  }

  function startCelebration() {
    for (let i = 0; i < 30; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.backgroundColor = ['#FFD700', '#2ECC71', '#FF6B6B', '#4facfe'][Math.floor(Math.random() * 4)];
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 3000);
    }
  }

  function showScore() {
    document.getElementById('game-section').style.display = 'none';
    const screen = document.getElementById('score-screen');
    screen.style.display = 'flex';
    let winner = "";
    if (gameMode === 1) winner = `Uau! ${scores[0]}/10`;
    else if (scores[0] > scores[1]) winner = gameMode === 2 ? "P1 Venceu!" : "Time A Venceu!";
    else if (scores[1] > scores[0]) winner = gameMode === 2 ? "P2 Venceu!" : "Time B Venceu!";
    else winner = "Empate!";
    document.getElementById('winner-text').innerText = winner;
    document.getElementById('final-stats').innerText = gameMode > 1 ? `Placar: ${scores[0]} - ${scores[1]}` : "";
  }
</script>
</body>
</html>
